<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CSS</title>

    <!-- CSS Interno -->
    <style>
        body {
            background-color: powderblue;
        }

        h2 {
            color: blue;
            font-family: Verdana;
            font-size: 200%;
        }

        p {
            color: red;
            font-family: Courier;
            font-size: 120%;
            border: 2px solid black;
            padding: 15px;
            margin: 20px;
        }
    </style>

    <!-- CSS Externo -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1 style="color: green;">CSS en HTML</h1>

    <p style="color: purple;">
        Este párrafo utiliza CSS en línea.
    </p>

    <h2>CSS Interno</h2>

    <p>
        Este párrafo utiliza los estilos definidos en la etiqueta &lt;style&gt;.
    </p>

    <h2>CSS Externo</h2>

    <p>
        Este documento también enlaza un archivo llamado styles.css mediante la
        etiqueta &lt;link&gt;.
    </p>

</body>

</html>
