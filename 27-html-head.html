<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejemplo del elemento head en HTML">
    <meta name="keywords" content="HTML, Head, Meta">
    <meta name="author" content="Jonatan Mendez">

    <title>Elemento Head</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        h1 {
            color: darkblue;
        }

        p {
            color: #333;
        }
    </style>

    <script>
        function mostrarMensaje() {
            alert("Hola desde JavaScript");
        }
    </script>
</head>

<body>

    <h1>Elemento Head</h1>

    <p>Esta página demuestra los elementos más comunes dentro del &lt;head&gt;.</p>

    <button onclick="mostrarMensaje()">Mostrar mensaje</button>

</body>

</html>
