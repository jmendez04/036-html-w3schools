<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Atributos</title>
</head>
<body>
    <h1 title="Este es un encabezado">Atributos HTML</h1>
    <p style="color: blue; ">
        Este parrafo utiliza el atributo <strong>style</strong>
    </p>

    <p title="Este texto aparece al pasar el cursor">
        Pasa el cursor sobre este parrafo para ver el atributo <strong>title</strong>
    </p>

    <h2>Imagen con atributos</h2>

    <img src="Perro1.jpg"
        alt="Imagen de un perro"
        width="350"
        height="250">
        
</body>
</html>
